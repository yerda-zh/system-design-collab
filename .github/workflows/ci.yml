name: CI

# Run this pipeline on every push and pull request
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: server

      # Run TypeScript type checking
      - name: Typecheck
        run: npm run typecheck
        working-directory: server

      # Run ESLint
      - name: Lint
        run: npm run lint
        working-directory: server
